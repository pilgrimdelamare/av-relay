name: live

on:
  workflow_dispatch:
    inputs:
      genre:
        required: true
        type: string
      video_ids:
        required: true
        type: string
      rtmp_url:
        required: true
        type: string
      duration_minutes:
        required: false
        type: string
        default: "290"
      start_at:
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: mask
        run: echo "::add-mask::${{ inputs.rtmp_url }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: setup
        run: |
          pip install --quiet google-api-python-client google-auth
          which ffmpeg || (sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg)

      - name: auth
        run: echo '${{ secrets.GDRIVE_SA_KEY }}' > sa.json

      - name: fetch
        env:
          VIDEO_IDS: ${{ inputs.video_ids }}
        run: python download.py

      - name: run
        env:
          RTMP_URL:         ${{ inputs.rtmp_url }}
          DURATION_MINUTES: ${{ inputs.duration_minutes }}
          START_AT:         ${{ inputs.start_at }}
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          ls -1 videos/*.mp4 | sort | \
            while IFS= read -r f; do echo "file '$f'"; done > merge_list.txt
          ffmpeg -f concat -safe 0 -i merge_list.txt \
            -vsync cfr -r 25 \
            -c:v libx264 -preset veryfast -b:v 4500k -maxrate 5500k -bufsize 11000k \
            -pix_fmt yuv420p -g 50 -keyint_min 50 -bf 0 \
            -c:a aac -b:a 192k -ar 44100 -ac 2 -af "aresample=async=1000" \
            merged.mp4

          while [ "$(date +%s)" -lt "$START_AT" ]; do
            sleep 5
          done

          end_time=$(( START_AT + DURATION_MINUTES * 60 ))

          (
            trigger_time=$(( end_time - 40 * 60 ))
            now=$(date +%s)
            if [ "$trigger_time" -gt "$now" ]; then
              sleep $(( trigger_time - now ))
            fi
            gh workflow run orchestrate.yml --repo pilgrimdelamare/av-relay
          ) &
          mid_pid=$!

          (
            while [ "$(date +%s)" -lt "$end_time" ]; do
              sleep 1200
              [ "$(date +%s)" -lt "$end_time" ] && \
                gh workflow run orchestrate.yml --repo pilgrimdelamare/av-relay 2>/dev/null || true
            done
          ) &
          periodic_pid=$!

          while [ "$(date +%s)" -lt "$end_time" ]; do
            remaining=$(( end_time - $(date +%s) ))
            if [ -s merged.mp4 ]; then
              ffmpeg -re -stream_loop -1 \
                -i merged.mp4 \
                -c copy \
                -f flv "$RTMP_URL" &
            else
              ffmpeg -re -stream_loop -1 \
                -f concat -safe 0 -i concat.txt \
                -c:v libx264 -preset veryfast \
                -b:v 4500k -maxrate 5500k -bufsize 11000k \
                -pix_fmt yuv420p -g 50 -keyint_min 50 -bf 0 \
                -c:a aac -b:a 192k -ar 44100 -af aresample=async=1 \
                -f flv "$RTMP_URL" &
            fi
            pid=$!
            ( sleep "$remaining" && kill "$pid" 2>/dev/null ) &
            watchdog=$!
            wait "$pid"
            code=$?
            kill "$watchdog" 2>/dev/null
            if [ "$(date +%s)" -ge "$end_time" ]; then
              break
            fi
            sleep 1
          done

          kill "$mid_pid" 2>/dev/null
          kill "$periodic_pid" 2>/dev/null

      - name: cleanup
        if: always()
        run: rm -f sa.json

      - name: re-trigger orchestrate
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run orchestrate.yml --repo pilgrimdelamare/av-relay
