name: live

on:
  workflow_dispatch:
    inputs:
      genre:
        required: true
        type: string
      video_ids:
        required: true
        type: string
      rtmp_url:
        required: true
        type: string
      duration_minutes:
        required: false
        type: string
        default: "290"

permissions:
  contents: read
  actions: write

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: mask
        run: echo "::add-mask::${{ inputs.rtmp_url }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: setup
        run: |
          pip install --quiet google-api-python-client google-auth
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: auth
        run: echo '${{ secrets.GDRIVE_SA_KEY }}' > sa.json

      - name: fetch
        env:
          VIDEO_IDS: ${{ inputs.video_ids }}
        run: python download.py

      - name: run
        env:
          RTMP_URL:         ${{ inputs.rtmp_url }}
          DURATION_MINUTES: ${{ inputs.duration_minutes }}
        run: |
          set +e
          end_time=$(( $(date +%s) + DURATION_MINUTES * 60 ))

          ls -1 videos/*.mp4 | sort | \
            while IFS= read -r f; do echo "file '$f'"; done > merge_list.txt
          ffmpeg -f concat -safe 0 -i merge_list.txt \
            -vsync cfr -r 25 \
            -c:v libx264 -preset veryfast -b:v 2000k -maxrate 2000k -bufsize 2000k \
            -pix_fmt yuv420p -g 50 -keyint_min 50 -bf 0 \
            -af aresample=async=1:first_pts=0 -c:a aac -b:a 128k -ar 44100 \
            merged.mp4

          while [ "$(date +%s)" -lt "$end_time" ]; do
            remaining=$(( end_time - $(date +%s) ))
            if [ -s merged.mp4 ]; then
              ffmpeg -re -stream_loop -1 \
                -i merged.mp4 \
                -c:v libx264 -preset veryfast \
                -b:v 2000k -maxrate 2000k -bufsize 2000k \
                -pix_fmt yuv420p -g 50 -keyint_min 50 -bf 0 \
                -c:a aac -b:a 128k -ar 44100 \
                -f flv "$RTMP_URL" &
            else
              ffmpeg -re -stream_loop -1 \
                -f concat -safe 0 -i concat.txt \
                -c:v libx264 -preset veryfast \
                -b:v 2000k -maxrate 2000k -bufsize 2000k \
                -pix_fmt yuv420p -g 50 -keyint_min 50 -bf 0 \
                -c:a aac -b:a 128k -ar 44100 -af aresample=async=1 \
                -f flv "$RTMP_URL" &
            fi
            pid=$!
            ( sleep "$remaining" && kill "$pid" 2>/dev/null ) &
            watchdog=$!
            wait "$pid"
            code=$?
            kill "$watchdog" 2>/dev/null
            if [ "$(date +%s)" -ge "$end_time" ]; then
              break
            fi
            sleep 1
          done

      - name: cleanup
        if: always()
        run: rm -f sa.json

      - name: re-trigger orchestrate
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run orchestrate.yml --repo pilgrimdelamare/av-relay
