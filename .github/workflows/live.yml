name: live

on:
  workflow_dispatch:
    inputs:
      genre:
        required: true
        type: string
      video_ids:
        description: "JSON array di ID file Drive"
        required: true
        type: string
      rtmp_url:
        required: true
        type: string
      duration_minutes:
        required: false
        type: string
        default: "345"

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: mask rtmp url
        run: echo "::add-mask::${{ inputs.rtmp_url }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install deps
        run: |
          pip install --quiet google-api-python-client google-auth
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: write service account key
        run: echo '${{ secrets.GDRIVE_SA_KEY }}' > sa.json

      - name: download videos from drive
        env:
          VIDEO_IDS: ${{ inputs.video_ids }}
        run: python download.py

      - name: relay to rtmp
        env:
          RTMP_URL: ${{ inputs.rtmp_url }}
          DURATION_MINUTES: ${{ inputs.duration_minutes }}
        run: |
          set +e
          end_time=$(( $(date +%s) + DURATION_MINUTES * 60 ))
          while [ "$(date +%s)" -lt "$end_time" ]; do
            remaining=$(( end_time - $(date +%s) ))
            ffmpeg -re -stream_loop -1 \
              -f concat -safe 0 -i concat.txt \
              -c:v libx264 -preset veryfast \
              -b:v 2000k -maxrate 2000k -bufsize 8000k \
              -pix_fmt yuv420p -g 50 -keyint_min 50 -bf 0 \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "$RTMP_URL" &
            pid=$!
            ( sleep "$remaining" && kill "$pid" 2>/dev/null ) &
            watchdog=$!
            wait "$pid"
            code=$?
            kill "$watchdog" 2>/dev/null
            if [ "$(date +%s)" -ge "$end_time" ]; then
              break
            fi
            echo "ffmpeg terminato (codice $code) prima della fine rotazione — riconnetto tra 3s"
            sleep 3
          done

      - name: cleanup
        if: always()
        run: rm -f sa.json
